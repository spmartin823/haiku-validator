<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haiku Validator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 40px;
      font-style: italic;
    }

    .line-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #2c2c2c;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #999;
    }

    .syllable-count {
      font-size: 0.85rem;
      color: #aaa;
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .syllable-count.valid { color: #5a8a5a; }
    .syllable-count.invalid { color: #b55; }

    .divider {
      width: 60px;
      height: 1px;
      background: #ccc;
      margin: 32px auto;
    }

    .result {
      font-size: 1.2rem;
      min-height: 1.6em;
      transition: opacity 0.3s;
    }

    .result.valid {
      color: #5a8a5a;
    }

    .result.invalid {
      color: #b55;
    }

    .result.empty {
      color: #ccc;
    }

    .pattern {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    .copy-btn {
      margin-top: 24px;
      padding: 8px 20px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.9rem;
      color: #888;
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .copy-btn:hover {
      color: #2c2c2c;
      border-color: #999;
    }

    .copy-btn.copied {
      color: #5a8a5a;
      border-color: #5a8a5a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Haiku Validator</h1>
    <p class="subtitle">5 &middot; 7 &middot; 5</p>

    <div class="line-group">
      <label>First line (5 syllables)</label>
      <div class="input-row">
        <input type="text" id="line1" placeholder="the old silent pond" autocomplete="off">
        <span class="syllable-count" id="count1">&mdash;</span>
      </div>
    </div>

    <div class="line-group">
      <label>Second line (7 syllables)</label>
      <div class="input-row">
        <input type="text" id="line2" placeholder="a frog jumps into the pond" autocomplete="off">
        <span class="syllable-count" id="count2">&mdash;</span>
      </div>
    </div>

    <div class="line-group">
      <label>Third line (5 syllables)</label>
      <div class="input-row">
        <input type="text" id="line3" placeholder="splash silence again" autocomplete="off">
        <span class="syllable-count" id="count3">&mdash;</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="result empty" id="result">type your haiku above</div>
    <div class="pattern" id="pattern"></div>
    <button class="copy-btn" id="copyBtn">copy haiku</button>
  </div>

  <script type="module">
    import { syllable } from 'https://esm.sh/syllable@2';
    function countLineSyllables(line) {
      const text = line.trim();
      if (!text) return 0;
      return syllable(text);
    }

    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const line3 = document.getElementById('line3');
    const count1 = document.getElementById('count1');
    const count2 = document.getElementById('count2');
    const count3 = document.getElementById('count3');
    const result = document.getElementById('result');
    const pattern = document.getElementById('pattern');

    function update() {
      const t1 = line1.value.trim();
      const t2 = line2.value.trim();
      const t3 = line3.value.trim();

      const s1 = t1 ? countLineSyllables(t1) : 0;
      const s2 = t2 ? countLineSyllables(t2) : 0;
      const s3 = t3 ? countLineSyllables(t3) : 0;

      const allEmpty = !t1 && !t2 && !t3;

      // Update counts
      function setCount(el, syllables, target, hasText) {
        if (!hasText) {
          el.textContent = '\u2014';
          el.className = 'syllable-count';
        } else {
          el.textContent = syllables;
          el.className = 'syllable-count ' + (syllables === target ? 'valid' : 'invalid');
        }
      }

      setCount(count1, s1, 5, !!t1);
      setCount(count2, s2, 7, !!t2);
      setCount(count3, s3, 5, !!t3);

      // Update result
      if (allEmpty) {
        result.textContent = 'type your haiku above';
        result.className = 'result empty';
        pattern.textContent = '';
      } else if (!t1 || !t2 || !t3) {
        result.textContent = 'fill in all three lines';
        result.className = 'result empty';
        pattern.textContent = '';
      } else if (s1 === 5 && s2 === 7 && s3 === 5) {
        result.textContent = 'valid haiku';
        result.className = 'result valid';
        pattern.textContent = s1 + ' \u00b7 ' + s2 + ' \u00b7 ' + s3;
      } else {
        result.textContent = 'not a haiku';
        result.className = 'result invalid';
        pattern.textContent = s1 + ' \u00b7 ' + s2 + ' \u00b7 ' + s3;
      }
    }

    line1.addEventListener('input', update);
    line2.addEventListener('input', update);
    line3.addEventListener('input', update);

    const copyBtn = document.getElementById('copyBtn');
    copyBtn.addEventListener('click', () => {
      const haiku = [line1.value, line2.value, line3.value]
        .map(l => l.trim()).join('\n');
      navigator.clipboard.writeText(haiku).then(() => {
        copyBtn.textContent = 'copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'copy haiku';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    });
  </script>
</body>
</html>
